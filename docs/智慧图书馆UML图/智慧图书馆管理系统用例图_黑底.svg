  <path class="line" d="M349 302 L209 102"/>
  <path class="line" d="M344 311 L302 153"/>
  <path class="line" d="M340 321 L226 217"/>
  <path class="line" d="M342 336 L358 285"/>
  <path class="line" d="M340 354 L211 345"/>
  <path class="line" d="M341 375 L354 407"/>
