  <text class="includeText" x="1098" y="284" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M1104 588 L1056 532"/>
  <rect class="includeBox" x="1060" y="548" width="88" height="22"/>
  <text class="includeText" x="1104" y="564" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>
</svg>
