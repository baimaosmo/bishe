  <path class="line" d="M381 430 L343 665"/>
  <path class="line" d="M405 426 L466 604"/>
  <path class="line" d="M406 304 L474 140"/>

  <!-- Associations admin -->
  <path class="line" d="M932 298 L1014 105"/>
  <path class="line" d="M940 314 L953 172"/>
  <path class="line" d="M943 333 L1010 250"/>
  <path class="line" d="M942 357 L908 328"/>
  <path class="line" d="M942 381 L1014 408"/>
  <path class="line" d="M934 406 L946 494"/>
  <path class="line" d="M930 428 L1048 584"/>

  <!-- Include / extend labels and dashed relations -->
  <path class="dash" d="M194 209 L180 168"/>
  <rect class="includeBox" x="184" y="176" width="88" height="22"/>
  <text class="includeText" x="228" y="192" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M220 260 L188 228"/>
  <rect class="includeBox" x="188" y="232" width="88" height="22"/>
  <text class="includeText" x="232" y="248" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M180 334 L214 288"/>
  <rect class="includeBox" x="178" y="300" width="88" height="22"/>
  <text class="includeText" x="222" y="316" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M222 459 L244 430"/>
  <rect class="includeBox" x="210" y="436" width="88" height="22"/>
  <text class="includeText" x="254" y="452" text-anchor="middle">&lt;&lt;extend&gt;&gt;</text>

  <path class="dash" d="M225 536 L178 496"/>
  <rect class="includeBox" x="176" y="502" width="88" height="22"/>
  <text class="includeText" x="220" y="518" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M1054 238 L1034 191"/>
  <rect class="includeBox" x="1012" y="203" width="88" height="22"/>
  <text class="includeText" x="1056" y="219" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <path class="dash" d="M1055 320 L1018 190"/>
