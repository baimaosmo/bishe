<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">智慧图书馆管理系统用例图</title>
  <desc id="desc">黑底白色椭圆风格的智慧图书馆管理系统 UML 用例图。</desc>
  <defs>
    <style>
      .bg { fill: #000000; }
      .case { fill: #ffffff; stroke: #ffffff; stroke-width: 2; }
      .caseText { font: 20px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #000000; }
      .actorText { font: 21px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #ffffff; }
      .includeBox { fill: #ffffff; stroke: #ffffff; stroke-width: 1.4; }
      .includeText { font: 16px "Times New Roman", serif; fill: #000000; }
      .line { stroke: #ffffff; stroke-width: 2; fill: none; }
      .dash { stroke: #ffffff; stroke-width: 1.8; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .actor { stroke: #ffffff; stroke-width: 4; stroke-linecap: round; fill: none; }
      .actorFill { fill: #ffffff; }
      .systemTitle { font: 700 25px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text x="640" y="38" class="systemTitle" text-anchor="middle">智慧图书馆管理系统用例图</text>

  <!-- Reader actor -->
  <g transform="translate(380 372)">
    <circle class="actorFill" cx="0" cy="-56" r="10"/>
    <path class="actor" d="M0,-43 L0,30 M-34,-18 L34,-18 M0,30 L-30,78 M0,30 L30,78"/>
    <text x="0" y="116" class="actorText" text-anchor="middle">读者用户</text>
    <text x="0" y="143" class="actorText" text-anchor="middle" font-size="17">普通用户 / 学生 / 教师</text>
  </g>

  <!-- Admin actor -->
  <g transform="translate(905 372)">
    <circle class="actorFill" cx="0" cy="-56" r="10"/>
    <path class="actor" d="M0,-43 L0,30 M-34,-18 L34,-18 M0,30 L-30,78 M0,30 L30,78"/>
    <text x="0" y="116" class="actorText" text-anchor="middle">管理员</text>
  </g>

  <!-- Reader use cases -->
  <ellipse class="case" cx="140" cy="86" rx="76" ry="26"/>
  <text class="caseText" x="140" y="93" text-anchor="middle">注册</text>

  <ellipse class="case" cx="240" cy="142" rx="78" ry="26"/>
  <text class="caseText" x="240" y="149" text-anchor="middle">登录</text>

  <ellipse class="case" cx="132" cy="212" rx="100" ry="27"/>
  <text class="caseText" x="132" y="219" text-anchor="middle">检索图书</text>

  <ellipse class="case" cx="260" cy="270" rx="104" ry="27"/>
  <text class="caseText" x="260" y="277" text-anchor="middle">查看图书详情</text>

  <ellipse class="case" cx="118" cy="344" rx="94" ry="27"/>
  <text class="caseText" x="118" y="351" text-anchor="middle">借阅图书</text>

  <ellipse class="case" cx="260" cy="408" rx="94" ry="27"/>
  <text class="caseText" x="260" y="415" text-anchor="middle">归还图书</text>

  <ellipse class="case" cx="125" cy="480" rx="112" ry="27"/>
  <text class="caseText" x="125" y="487" text-anchor="middle">收藏评价图书</text>

  <ellipse class="case" cx="264" cy="546" rx="112" ry="27"/>
  <text class="caseText" x="264" y="553" text-anchor="middle">查看推荐书单</text>

  <ellipse class="case" cx="134" cy="620" rx="112" ry="27"/>
  <text class="caseText" x="134" y="627" text-anchor="middle">预约释放座位</text>

  <ellipse class="case" cx="276" cy="684" rx="112" ry="27"/>
  <text class="caseText" x="276" y="691" text-anchor="middle">参与图书漂流</text>

  <ellipse class="case" cx="510" cy="626" rx="104" ry="27"/>
  <text class="caseText" x="510" y="633" text-anchor="middle">维护个人信息</text>

  <ellipse class="case" cx="520" cy="118" rx="104" ry="27"/>
  <text class="caseText" x="520" y="125" text-anchor="middle">AI智能检索</text>

  <!-- Admin use cases -->
  <ellipse class="case" cx="1086" cy="88" rx="112" ry="27"/>
  <text class="caseText" x="1086" y="95" text-anchor="middle">图书信息管理</text>

  <ellipse class="case" cx="1028" cy="166" rx="112" ry="27"/>
  <text class="caseText" x="1028" y="173" text-anchor="middle">用户账号管理</text>

  <ellipse class="case" cx="1130" cy="244" rx="126" ry="27"/>
  <text class="caseText" x="1130" y="251" text-anchor="middle">批量导入学生</text>

  <ellipse class="case" cx="1030" cy="328" rx="126" ry="27"/>
  <text class="caseText" x="1030" y="335" text-anchor="middle">评价审核</text>

  <ellipse class="case" cx="1134" cy="412" rx="126" ry="27"/>
  <text class="caseText" x="1134" y="419" text-anchor="middle">图书漂流管理</text>

  <ellipse class="case" cx="1040" cy="506" rx="142" ry="27"/>
  <text class="caseText" x="1040" y="513" text-anchor="middle">借阅座位数据查看</text>

  <ellipse class="case" cx="1134" cy="600" rx="126" ry="27"/>
  <text class="caseText" x="1134" y="607" text-anchor="middle">数据统计分析</text>

