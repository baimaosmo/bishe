{% extends "base.html" %}

{% block title %}AI 数据大屏与报告 - 智能图书管理系统{% endblock %}

{% block content %}
<!-- 引入 ECharts 官方 CDN -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

<div class="fade-in max-w-7xl mx-auto pb-10">
    
    <!-- 头部标题 -->
    <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center">
        <div>
            <h2 class="text-3xl font-bold text-gray-800 flex items-center">
                <i class="fas fa-chart-pie text-indigo-600 mr-3"></i>馆藏与空间大数据分析
            </h2>
            <p class="text-sm text-gray-500 mt-2">基于全馆本月的借阅记录与选座数据，由 AI 生成的综合报告。</p>
        </div>
        <div class="mt-4 md:mt-0 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-sm font-bold border border-indigo-100 flex items-center shadow-sm">
            <i class="fas fa-calendar-check mr-2"></i> {{ current_month | default('本月实时报表') }}
        </div>
    </div>

    <!-- AI 智能摘要卡片 (高光区域) -->
    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 rounded-2xl shadow-lg p-6 mb-8 text-white relative overflow-hidden">
        <div class="absolute top-0 right-0 opacity-10">
            <i class="fas fa-robot text-9xl -mt-5 -mr-5"></i>
        </div>
        <h3 class="text-lg font-bold mb-3 flex items-center">
            <i class="fas fa-magic mr-2 text-yellow-300"></i> AI 智能运营洞察
        </h3>
        <div class="text-blue-50 leading-relaxed relative z-10">
            <p>{{ ai_summary }}</p>
        </div>
    </div>

    <!-- 图表矩阵 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        
        <!-- 左侧：近30天借阅趋势图 (占据 2 列) -->
        <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h4 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
                <i class="fas fa-chart-line text-blue-500 mr-2"></i>全馆借阅量趋势 (近30天)
            </h4>
            <div id="trendChart" style="width: 100%; height: 320px;"></div>
        </div>

        <!-- 右侧：图书分类偏好饼图 (占据 1 列) -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h4 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
                <i class="fas fa-book-open text-orange-500 mr-2"></i>本月借阅分类偏好
            </h4>
            <div id="pieChart" style="width: 100%; height: 320px;"></div>
        </div>
    </div>

    <!-- 底部：选座热力图 -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
        <h4 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
            <i class="fas fa-fire-alt text-red-500 mr-2"></i>自习室选座拥挤度热力图
        </h4>
        <div id="heatmapChart" style="width: 100%; height: 350px;"></div>
    </div>

</div>

<!-- ECharts 初始化脚本 -->
<script>
    // 接收后端传来的 JSON 数据
    const dateList = {{ date_list | safe }};
    const borrowTrend = {{ borrow_trend | safe }};
    const bookCategories = {{ book_categories | safe }};
    const heatmapData = {{ heatmap_data | safe }};

    // --- 1. 渲染折线趋势图 ---
    const trendChart = echarts.init(document.getElementById('trendChart'));
    trendChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', boundaryGap: false, data: dateList },
        yAxis: { type: 'value' },
        series: [{
            name: '借阅人次',
            type: 'line',
            smooth: true, // 开启平滑曲线
            data: borrowTrend,
            areaStyle: { // 添加渐变阴影
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(59, 130, 246, 0.5)' },
                    { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
                ])
            },
            itemStyle: { color: '#3b82f6' } // Tailwind blue-500
        }]
    });

    // --- 2. 渲染饼图 ---
    const pieChart = echarts.init(document.getElementById('pieChart'));
    pieChart.setOption({
        tooltip: { trigger: 'item' },
        legend: { bottom: '0%', left: 'center' },
        series: [{
            name: '借阅分类',
            type: 'pie',
            radius: ['40%', '70%'], // 环形图效果
            avoidLabelOverlap: false,
            itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
            label: { show: false, position: 'center' },
            emphasis: { label: { show: true, fontSize: 20, fontWeight: 'bold' } },
            data: bookCategories
        }]
    });

    // --- 3. 渲染选座热力图 ---
    const heatmapChart = echarts.init(document.getElementById('heatmapChart'));
    
    // Y轴：每天的时间段
    const hours = ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'];
    // X轴：星期几
    const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

    heatmapChart.setOption({
        tooltip: { position: 'top' },
        grid: { height: '70%', top: '10%' },
        xAxis: { type: 'category', data: days, splitArea: { show: true } },
        yAxis: { type: 'category', data: hours, splitArea: { show: true } },
        visualMap: {
            min: 0, max: 100, calculable: true,
            orient: 'horizontal', left: 'center', bottom: '0%',
            inRange: { color: ['#ebedf0', '#c6e48b', '#7bc96f', '#239a3b', '#196127', '#e11d48'] } // 从灰绿过渡到深红
        },
        series: [{
            name: '座位占用率',
            type: 'heatmap',
            data: heatmapData,
            label: { show: true },
            emphasis: {
                itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' }
            }
        }]
    });

    // 监听窗口大小变化，自动调整图表大小 (响应式)
    window.addEventListener('resize', function() {
        trendChart.resize();
        pieChart.resize();
        heatmapChart.resize();
    });
</script>
{% endblock %}
