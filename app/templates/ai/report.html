{% extends "base.html" %}

{% block title %}摘要与报告生成 - 智能图书管理系统{% endblock %}

{% block content %}
<div class="fade-in max-w-7xl mx-auto h-[calc(100vh-8rem)] flex flex-col">
    
    <div class="mb-4 flex items-center justify-between">
        <div class="flex items-center">
            <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl mr-4 shadow-sm">
                <i class="fas fa-file-signature"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-gray-800">智能摘要与报告生成</h2>
                <p class="text-sm text-gray-500 mt-1">基于大模型自动生成图书摘要、读书笔记或深度书评。生成后可继续要求 AI 修改优化。</p>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
        
        <div class="w-full md:w-1/3 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col overflow-y-auto">
            <h3 class="text-lg font-bold text-gray-800 mb-6 border-b border-gray-100 pb-3">生成设置</h3>
            
            <div class="space-y-5 flex-1">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择目标</label>
                    <div class="flex bg-gray-100 p-1 rounded-lg">
                        <button id="btn-type-book" onclick="switchType('book')" class="flex-1 py-1.5 text-sm font-bold bg-white text-indigo-600 rounded shadow-sm transition">馆藏图书</button>
                        <button id="btn-type-custom" onclick="switchType('custom')" class="flex-1 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-700 rounded transition">自定义主题</button>
                    </div>
                </div>

                <div id="div-book-select">
                    <select id="book-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="">-- 请选择馆藏图书 --</option>
                        {% for book in books %}
                        <option value="{{ book.id }}">《{{ book.title }}》- {{ book.author }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="div-custom-input" class="hidden">
                    <input type="text" id="custom-topic" placeholder="输入你想生成报告的主题或书名..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">报告类型</label>
                    <select id="report-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="核心摘要">📖 核心内容摘要</option>
                        <option value="读书笔记">📝 结构化读书笔记</option>
                        <option value="深度书评">🧐 深度评价与书评</option>
                        <option value="文献综述">📚 领域文献综述</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">期望篇幅</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="border border-gray-200 rounded-lg p-2 flex items-center justify-center cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="length" value="简短精炼 (约300字)" class="text-indigo-600 focus:ring-indigo-500 mr-2">
                            <span class="text-xs font-medium">简短</span>
                        </label>
                        <label class="border border-indigo-200 bg-indigo-50 rounded-lg p-2 flex items-center justify-center cursor-pointer">
                            <input type="radio" name="length" value="适中详细 (约800字)" checked class="text-indigo-600 focus:ring-indigo-500 mr-2">
                            <span class="text-xs font-medium text-indigo-700">适中</span>
                        </label>
                        <label class="border border-gray-200 rounded-lg p-2 flex items-center justify-center cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="length" value="深度长文 (1500字以上)" class="text-indigo-600 focus:ring-indigo-500 mr-2">
                            <span class="text-xs font-medium">深度</span>
                        </label>
                    </div>
                </div>
            </div>

            <button id="generate-btn" onclick="generateReport()" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-md flex items-center justify-center">
                <i class="fas fa-magic mr-2"></i> 开始生成新报告
            </button>
        </div>

        <div class="w-full md:w-2/3 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col relative overflow-hidden">
            <div class="bg-gray-50 border-b border-gray-100 px-6 py-3 flex justify-between items-center z-10">
                <span class="text-sm font-bold text-gray-700"><i class="fas fa-eye mr-2"></i>生成预览</span>
                <div class="space-x-2">
                    <button onclick="copyContent()" class="text-gray-500 hover:text-indigo-600 transition px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-medium shadow-sm">
                        <i class="far fa-copy mr-1"></i> 复制
                    </button>
                    <button onclick="downloadMarkdown()" class="text-gray-500 hover:text-green-600 transition px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-medium shadow-sm">
                        <i class="fas fa-download mr-1"></i> 下载 .md
                    </button>
                </div>
            </div>
            
            <div id="report-output" class="flex-1 p-8 overflow-y-auto prose prose-indigo max-w-none text-gray-700">
                <div class="h-full flex flex-col items-center justify-center text-gray-400">
                    <i class="fas fa-file-alt text-6xl mb-4 opacity-20"></i>
                    <p>在左侧配置参数后点击生成，报告将显示在此处。</p>
                </div>
            </div>

            <div id="refine-area" class="hidden bg-indigo-50 border-t border-indigo-100 p-4 shrink-0 z-10">
                <div class="flex items-center">
                    <input type="text" id="refine-input" placeholder="对生成的报告不满意？告诉助手怎么修改（例如：把第一段精简一下，或者语气幽默点）..." class="flex-1 px-4 py-2.5 border border-gray-300 rounded-l-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm">
                    <button onclick="refineReport()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-r-lg hover:bg-indigo-700 transition text-sm font-bold shadow-sm flex items-center">
                        <i class="fas fa-sync-alt mr-2"></i> 优化
                    </button>
                </div>
            </div>

            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-20">
                <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p class="text-indigo-600 font-bold animate-pulse">智能助手正在为您撰写报告...</p>
                <p class="text-xs text-gray-500 mt-2">大型报告生成较慢，预计需要 10 - 30 秒</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    let currentTargetType = 'book';
    
    // 【核心修改 1】：初始化时优先从 sessionStorage 读取旧的报告内容
    let rawMarkdown = sessionStorage.getItem('ai_report_markdown') || '';

    // 【核心修改 2】：页面加载时，如果有缓存的报告，直接渲染出来并显示优化区域
    window.addEventListener('DOMContentLoaded', () => {
        if (rawMarkdown) {
            document.getElementById('report-output').innerHTML = marked.parse(rawMarkdown);
            document.getElementById('refine-area').classList.remove('hidden');
        }
    });

    // 切换单选框 UI (保持不变)
    document.querySelectorAll('input[name="length"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.querySelectorAll('input[name="length"]').forEach(r => {
                r.closest('label').className = 'border border-gray-200 rounded-lg p-2 flex items-center justify-center cursor-pointer hover:bg-gray-50';
                r.nextElementSibling.className = 'text-xs font-medium';
            });
            this.closest('label').className = 'border border-indigo-200 bg-indigo-50 rounded-lg p-2 flex items-center justify-center cursor-pointer';
            this.nextElementSibling.className = 'text-xs font-medium text-indigo-700';
        });
    });

    // 切换 馆藏/自定义 (保持不变)
    function switchType(type) {
        currentTargetType = type;
        const btnBook = document.getElementById('btn-type-book');
        const btnCustom = document.getElementById('btn-type-custom');
        const divBook = document.getElementById('div-book-select');
        const divCustom = document.getElementById('div-custom-input');

        if (type === 'book') {
            btnBook.className = "flex-1 py-1.5 text-sm font-bold bg-white text-indigo-600 rounded shadow-sm transition";
            btnCustom.className = "flex-1 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-700 rounded transition";
            divBook.classList.remove('hidden');
            divCustom.classList.add('hidden');
        } else {
            btnCustom.className = "flex-1 py-1.5 text-sm font-bold bg-white text-indigo-600 rounded shadow-sm transition";
            btnBook.className = "flex-1 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-700 rounded transition";
            divCustom.classList.remove('hidden');
            divBook.classList.add('hidden');
        }
    }

    // 首次生成报告
    async function generateReport() {
        const bookId = document.getElementById('book-select').value;
        const customTopic = document.getElementById('custom-topic').value.trim();
        const reportType = document.getElementById('report-type').value;
        const length = document.querySelector('input[name="length"]:checked').value;

        if (currentTargetType === 'book' && !bookId) return alert('请先选择一本馆藏图书！');
        if (currentTargetType === 'custom' && !customTopic) return alert('请填写自定义主题！');

        document.getElementById('loading-overlay').classList.remove('hidden');
        const generateBtn = document.getElementById('generate-btn');
        generateBtn.disabled = true;

        try {
            const response = await fetch("{{ url_for('ai.api_generate_report') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    target_type: currentTargetType,
                    book_id: bookId,
                    custom_topic: customTopic,
                    report_type: reportType,
                    length: length
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                rawMarkdown = data.report;
                // 【核心修改 3】：生成成功后，将报告存入 sessionStorage
                sessionStorage.setItem('ai_report_markdown', rawMarkdown);
                
                document.getElementById('report-output').innerHTML = marked.parse(rawMarkdown);
                document.getElementById('refine-area').classList.remove('hidden');
            } else {
                alert(`生成失败：${data.error}`);
            }
        } catch (error) {
            alert('网络请求失败，请稍后再试。');
        } finally {
            document.getElementById('loading-overlay').classList.add('hidden');
            generateBtn.disabled = false;
        }
    }

    // 基于记忆的继续优化报告
    async function refineReport() {
        const refinePrompt = document.getElementById('refine-input').value.trim();
        if (!refinePrompt) return alert('请填写修改要求！');
        if (!rawMarkdown) return alert('当前没有可供优化的报告！');

        document.getElementById('loading-overlay').classList.remove('hidden');
        
        try {
            const response = await fetch("{{ url_for('ai.api_generate_report') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    previous_report: rawMarkdown, 
                    refine_prompt: refinePrompt   
                })
            });
            
            const data = await response.json();
            if (response.ok) {
                rawMarkdown = data.report; 
                // 【核心修改 4】：优化成功后，更新 sessionStorage 中的报告
                sessionStorage.setItem('ai_report_markdown', rawMarkdown);

                document.getElementById('report-output').innerHTML = marked.parse(rawMarkdown);
                document.getElementById('refine-input').value = ''; 
            } else {
                alert(`优化失败：${data.error}`);
            }
        } catch (error) {
            alert('网络请求失败，请稍后再试。');
        } finally {
            document.getElementById('loading-overlay').classList.add('hidden');
        }
    }

    // 复制功能 (保持不变)
    function copyContent() {
        if (!rawMarkdown) return alert('暂无内容可复制');
        navigator.clipboard.writeText(rawMarkdown).then(() => {
            alert('已复制 Markdown 内容到剪贴板！');
        });
    }

    // 下载文件功能 (保持不变)
    function downloadMarkdown() {
        if (!rawMarkdown) return alert('暂无内容可下载');
        const blob = new Blob([rawMarkdown], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const filename = currentTargetType === 'book' ? '图书报告.md' : '主题报告.md';
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

<style>
    /* 针对 Markdown 输出的美化 */
    .prose h1, .prose h2, .prose h3 { color: #1f2937; border-bottom: 1px solid #f3f4f6; padding-bottom: 0.3em; margin-bottom: 0.8em; margin-top: 1.5em; }
    .prose p { margin-bottom: 1em; line-height: 1.7; }
    .prose strong { color: #4f46e5; }
    .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
    .prose blockquote { border-left: 4px solid #c7d2fe; padding-left: 1em; color: #6b7280; font-style: italic; background: #fefeff; padding: 0.5em 1em; }
</style>
{% endblock %}
