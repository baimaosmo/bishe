<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智能图书管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-8 px-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">注册校内账号</h2>
            <p class="text-sm text-gray-500 mt-2">学生使用学号注册，教师使用工号注册</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded text-sm {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">注册身份</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="account_type" value="student" class="peer sr-only" checked onchange="switchAccountType()">
                        <span class="block text-center px-4 py-2.5 rounded-lg border border-gray-300 peer-checked:border-blue-600 peer-checked:bg-blue-50 peer-checked:text-blue-700 transition">
                            <i class="fas fa-user-graduate mr-1"></i> 学生
                        </span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="account_type" value="teacher" class="peer sr-only" onchange="switchAccountType()">
                        <span class="block text-center px-4 py-2.5 rounded-lg border border-gray-300 peer-checked:border-blue-600 peer-checked:bg-blue-50 peer-checked:text-blue-700 transition">
                            <i class="fas fa-chalkboard-teacher mr-1"></i> 教师
                        </span>
                    </label>
                </div>
            </div>

            <div>
                <label id="account-label" class="block text-sm font-medium text-gray-700 mb-1">学号</label>
                <input id="account-input" type="text" name="account_no" required placeholder="请输入学号"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                <input type="text" name="name" required placeholder="请输入真实姓名"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                    <select name="gender" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition bg-white">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">专业</label>
                    <input type="text" name="major" required placeholder="如：计算机科学与技术"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">设置密码</label>
                <input type="password" name="password" required minlength="8" placeholder="至少 8 位，包含字母和数字"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" name="confirm_password" required minlength="8" placeholder="请再次输入密码"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-lg transition shadow-md mt-4">
                注 册
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            已有账号？ <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline font-medium">返回登录</a>
        </div>
    </div>

    <script>
        function switchAccountType() {
            const type = document.querySelector('input[name="account_type"]:checked').value;
            const label = document.getElementById('account-label');
            const input = document.getElementById('account-input');
            if (type === 'teacher') {
                label.textContent = '工号';
                input.placeholder = '请输入教师工号';
            } else {
                label.textContent = '学号';
                input.placeholder = '请输入学号';
            }
        }
    </script>
</body>
</html>
