<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}智能图书管理系统{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a', // 深蓝色基调，沉稳专业
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-white shadow-lg flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-gray-200">
            <h1 class="text-xl font-bold text-primary"><i class="fas fa-book-reader mr-2"></i>智能图书系统</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="{{ url_for('main.dashboard') }}" class="flex items-center px-4 py-3 bg-blue-50 text-blue-700 rounded-lg">
                <i class="fas fa-chart-line w-5 h-5 mr-3"></i> 控制台看板
            </a>
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2">核心业务</div>
            <a href="{{ url_for('books.book_list') }}" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-book w-5 h-5 mr-3"></i> 图书管理
            </a>
            <a href="{{ url_for('books.my_borrowing') }}" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-exchange-alt w-5 h-5 mr-3"></i> 借阅与归还
            </a>
            <a href="{{ url_for('seats.index') }}" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-chair w-5 h-5 mr-3"></i> 选座管理
            </a>
            
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2">AI 智能服务</div>
            <a href="{{ url_for('ai.search_page') }}" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-robot w-5 h-5 mr-3"></i> 智能搜索与匹配
            </a>
            <a href="{{ url_for('ai.report_page') }}" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-file-alt w-5 h-5 mr-3"></i> 摘要与报告生成
            </a>

            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2">系统设置</div>
            <a href="#" class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-50 hover:text-primary rounded-lg transition-colors">
                <i class="fas fa-users-cog w-5 h-5 mr-3"></i> 用户与权限
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <a href="{{ url_for('auth.logout') }}" class="flex items-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <i class="fas fa-sign-out-alt w-5 h-5 mr-3"></i> 退出登录
            </a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <div class="flex items-center">
                <button class="md:hidden text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div class="relative ml-4 md:ml-0">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fas fa-search text-gray-400"></i>
                    </span>
                    <input type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm transition duration-150 ease-in-out" placeholder="快速全局搜索...">
                </div>
            </div>
            <div class="flex items-center">
                <span class="text-sm text-gray-600 mr-4">欢迎回来, <strong>管理员</strong></span>
                <img class="h-8 w-8 rounded-full object-cover border-2 border-primary" src="https://ui-avatars.com/api/?name=Admin&background=1e3a8a&color=fff" alt="User Avatar">
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
