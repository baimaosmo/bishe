{% extends "base.html" %}

{% block title %}编辑图书 - 智能图书管理系统{% endblock %}

{% block content %}
<div class="fade-in max-w-3xl mx-auto pb-10">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                <i class="fas fa-edit text-primary mr-3"></i>编辑图书信息
            </h2>
            <p class="text-sm text-gray-500 mt-1">修改《{{ book.title }}》的基础资料与实体存放位置。</p>
        </div>
        <a href="{{ url_for('books.book_list') }}" class="text-gray-500 hover:text-primary transition font-medium text-sm flex items-center">
            <i class="fas fa-arrow-left mr-1"></i> 返回列表
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="bg-gray-50 px-8 py-4 border-b border-gray-100 flex items-center justify-between">
            <span class="text-sm text-gray-500 font-mono">ISBN: {{ book.isbn }}</span>
            <span class="px-2.5 py-1 text-xs font-bold rounded-full {% if book.status == 'available' %}bg-green-100 text-green-700{% else %}bg-orange-100 text-orange-700{% endif %}">
                状态: {{ '可借阅' if book.status == 'available' else '已借出' }}
            </span>
        </div>

        <div class="p-8">
            <form action="{{ url_for('books.edit_book', book_id=book.id) }}" method="POST">
                
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2">基础信息</h3>
                
                <!-- ISBN 虽然不能修改，但展示给管理员看 -->
                <div class="mb-4 hidden">
                    <input type="hidden" name="isbn" value="{{ book.isbn }}">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">书名 <span class="text-red-500">*</span></label>
                    <input type="text" name="title" value="{{ book.title }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作者 <span class="text-red-500">*</span></label>
                        <input type="text" name="author" value="{{ book.author }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">出版社</label>
                        <input type="text" name="publisher" value="{{ book.publisher or '' }}" placeholder="如: 机械工业出版社" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">图书分类</label>
                    <select name="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none bg-white transition">
                        <option value="计算机科学" {% if book.category == '计算机科学' %}selected{% endif %}>计算机科学</option>
                        <option value="文学" {% if book.category == '文学' %}selected{% endif %}>文学</option>
                        <option value="自然科学" {% if book.category == '自然科学' %}selected{% endif %}>自然科学</option>
                        <option value="历史" {% if book.category == '历史' %}selected{% endif %}>历史</option>
                        <option value="哲学" {% if book.category == '哲学' %}selected{% endif %}>哲学</option>
                        <option value="艺术" {% if book.category == '艺术' %}selected{% endif %}>艺术</option>
                        <option value="其他" {% if book.category == '其他' %}selected{% endif %}>其他</option>
                    </select>
                </div>

                <!-- 物理位置信息区 -->
                <div class="mb-6 bg-blue-50/50 p-5 rounded-xl border border-blue-100 mt-6">
                    <h4 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
                        <i class="fas fa-map-marker-alt text-red-500 mr-2"></i>实体馆藏位置设置
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">所在楼层 (数字)</label>
                            <input type="number" name="floor" value="{{ book.floor }}" min="1" max="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">所在区域</label>
                            <input type="text" name="area" value="{{ book.area }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">书架号</label>
                            <input type="text" name="shelf" value="{{ book.shelf }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none shadow-sm">
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium text-gray-700 mb-1">内容简介</label>
                    <textarea name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition resize-y">{{ book.description or '' }}</textarea>
                </div>

                <div class="flex justify-end pt-4 border-t border-gray-100">
                    <a href="{{ url_for('books.book_list') }}" class="px-6 py-2.5 bg-white border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition mr-3">
                        取消修改
                    </a>
                    <button type="submit" class="px-8 py-2.5 bg-primary text-white font-bold rounded-lg hover:bg-blue-800 transition shadow-md flex items-center">
                        <i class="fas fa-check mr-2"></i> 保存修改
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
