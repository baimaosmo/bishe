{% extends "base.html" %}

{% block title %}新增图书 - 智能图书管理系统{% endblock %}

{% block content %}
<div class="fade-in max-w-3xl mx-auto">
    <div class="flex items-center mb-6">
        <a href="{{ url_for('books.book_list') }}" class="text-gray-500 hover:text-primary mr-4 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <div>
            <h2 class="text-2xl font-semibold text-gray-800">新增图书入库</h2>
            <p class="text-sm text-gray-500 mt-1">录入新的馆藏书籍基础信息。</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <form method="POST" action="{{ url_for('books.add_book') }}" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ISBN (国际标准书号) <span class="text-red-500">*</span></label>
                    <input type="text" name="isbn" required placeholder="例如: 978-7-111-59971-5" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">书名 <span class="text-red-500">*</span></label>
                    <input type="text" name="title" required placeholder="输入完整的书名" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">作者</label>
                    <input type="text" name="author" placeholder="多个作者用逗号隔开" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">出版社</label>
                    <input type="text" name="publisher" placeholder="例如: 清华大学出版社" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">图书分类</label>
                <select name="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition bg-white">
                    <option value="计算机科学">计算机科学</option>
                    <option value="文学">文学</option>
                    <option value="自然科学">自然科学</option>
                    <option value="历史">历史</option>
                    <option value="哲学">哲学</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="pt-4 flex justify-end space-x-3 border-t border-gray-100">
                <a href="{{ url_for('books.book_list') }}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">取消</a>
                <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-800 shadow-md transition">
                    <i class="fas fa-save mr-2"></i> 保存入库
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
